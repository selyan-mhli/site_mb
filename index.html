<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Fonts are self-hosted via @fontsource (loaded in main.tsx) -->
  <link rel="preload" as="image" href="/images/projects/entrepot-orange/cover.jpg" fetchpriority="high" />

  <!-- Analytics (Plausible — RGPD-friendly, no cookies) -->
  <script defer data-domain="mb-amenageurs.fr" src="https://plausible.io/js/script.js"></script>

  <title>MB Aménageurs — Rachat de hangars et bâtiments industriels en PACA</title>
  <meta name="description" content="MB Aménageurs rachète vos hangars, bâtiments industriels et locaux commerciaux en région PACA. Réponse garantie sous 48h." />

  <!-- Skip link for accessibility -->
  <style>
    .skip-link {
      position: absolute;
      top: -100%;
      left: 8px;
      background: #0B5BAC;
      color: #fff;
      padding: 8px 16px;
      border-radius: 0 0 8px 8px;
      z-index: 10000;
      text-decoration: none;
      font-weight: 600;
      transition: top 0.2s;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Aller au contenu principal</a>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
